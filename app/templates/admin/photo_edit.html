{% extends 'admin/base.html' %}
{% block title %}Modifier la photo{% endblock %}
{% block page_title %}Modifier la photo{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="bg-gray-900 border border-white/5 rounded-2xl p-8">
    <div class="mb-6 aspect-video bg-gray-800 rounded-xl overflow-hidden">
      <img src="{{ photo.image_url }}" alt="{{ photo.title }}" class="w-full h-full object-cover">
    </div>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Titre</label>
        <input type="text" name="title" value="{{ photo.title }}" required
          class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Catégorie</label>
          <select name="category"
            class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
            {% for cat in categories %}
            <option value="{{ cat }}" {% if photo.category == cat %}selected{% endif %}>{{ cat|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Ordre</label>
          <input type="number" name="sort_order" value="{{ photo.sort_order }}" min="0"
            class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Description</label>
        <textarea name="description" rows="3"
          class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition resize-none">{{ photo.description or '' }}</textarea>
      </div>

      <div class="flex gap-6 mb-6">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="is_featured" class="w-4 h-4 accent-[#78b9d7]" {% if photo.is_featured %}checked{% endif %}>
          <span class="text-sm text-gray-300">Hero</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="is_visible" class="w-4 h-4 accent-[#78b9d7]" {% if photo.is_visible %}checked{% endif %}>
          <span class="text-sm text-gray-300">Visible</span>
        </label>
      </div>

      <div class="flex gap-3">
        <button type="submit" class="flex-1 py-2.5 rounded-xl font-semibold text-sm text-white grad hover:opacity-90 transition">
          Sauvegarder
        </button>
        <a href="{{ url_for('admin.photos') }}" class="px-4 py-2.5 rounded-xl text-sm text-gray-400 border border-white/10 hover:border-white/25 transition">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
