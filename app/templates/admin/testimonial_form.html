{% extends 'admin/base.html' %}
{% block title %}{% if t %}Modifier{% else %}Ajouter{% endif %} témoignage{% endblock %}
{% block page_title %}{% if t %}Modifier{% else %}Ajouter{% endif %} un témoignage{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="bg-gray-900 border border-white/5 rounded-2xl p-8">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Nom du client *</label>
        <input type="text" name="author_name" required value="{{ t.author_name if t else '' }}"
          class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Rôle / contexte</label>
        <input type="text" name="author_role" value="{{ t.author_role if t else '' }}"
          placeholder="ex: Mariage — Moroni"
          class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Témoignage *</label>
        <textarea name="content" rows="5" required
          class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition resize-none">{{ t.content if t else '' }}</textarea>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Note (1–5)</label>
          <select name="rating"
            class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
            {% for i in range(5, 0, -1) %}
            <option value="{{ i }}" {% if t and t.rating == i %}selected{% elif not t and i == 5 %}selected{% endif %}>
              {{ '★' * i }}{{ '☆' * (5-i) }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Ordre</label>
          <input type="number" name="sort_order" value="{{ t.sort_order if t else 0 }}" min="0"
            class="w-full bg-gray-800 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#78b9d7] transition">
        </div>
      </div>

      <label class="flex items-center gap-3 mb-6 cursor-pointer">
        <input type="checkbox" name="is_visible" class="w-4 h-4 accent-[#78b9d7]"
          {% if not t or t.is_visible %}checked{% endif %}>
        <span class="text-sm text-gray-300">Visible sur le site</span>
      </label>

      <div class="flex gap-3">
        <button type="submit" class="flex-1 py-2.5 rounded-xl font-semibold text-sm text-white grad hover:opacity-90 transition">
          {% if t %}Sauvegarder{% else %}Ajouter{% endif %}
        </button>
        <a href="{{ url_for('admin.testimonials') }}" class="px-4 py-2.5 rounded-xl text-sm text-gray-400 border border-white/10 hover:border-white/25 transition">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
